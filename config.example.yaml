# Curiosity Engine Configuration

heartbeat:
  min_minutes: 1
  max_minutes: 10

input_pipeline:
  vision:
    enabled: true
    history_window: 10
    base_weight: 0.35
    min_novelty_for_description: 0.3

  audio:
    enabled: true
    history_window_minutes: 5
    base_weight_direct: 1.0
    base_weight_overheard: 0.25
    wake_word: "Hey Curiosity"

  text:
    enabled: true
    history_window: 10
    base_weight: 0.40
    excluded_apps: []
    excluded_urls: []

  novelty:
    skip_threshold: 0.15
    decay_rate: 0.95

association_tree:
  branching_factor: 3
  min_depth: 4
  max_depth: 7
  min_domain_crossings: 1
  early_stop_distance: 0.8

scoring:
  weights:
    semantic_distance: 0.30
    domain_crossings: 0.25
    surprise: 0.20
    bridgeability: 0.15
    novelty: 0.10
  fire_threshold: 0.45
  incubation_threshold: 0.30
  incubation_max_reevaluations: 5
  incubation_max_age_hours: 24

output:
  max_interjection_sentences: 3
  rate_limit_per_cycle: 1

llm:
  provider: null     # to be configured: openai, anthropic, etc.
  model: null        # to be configured
  api_key_env: null  # environment variable name holding API key

search:
  provider: null     # to be configured: tavily, serpapi, brave
  api_key_env: null
  results_per_query: 5

memory:
  vector_db: "chromadb"
  sqlite_path: "data/curiosity.db"
  collection_name: "conversations"
